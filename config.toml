baseURL = '/'
languageCode = 'en-us'
title = 'Stargaze'
theme = 'PaperMod'
env = 'production'
enableRobotsTXT = true

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.goldmark]
    renderer = { unsafe = true }

[params]
  description = 'Stargaze tracks the emerging space data center industry — orbital facilities using continuous solar irradiance and passive radiative cooling to meet the compute demands of the AI era.'
  keywords = ['space data centers', 'orbital data centers', 'space computing', 'AI infrastructure', 'radiative cooling', 'solar power satellites', 'LEO data centers', 'space solar power']
  author = 'Stargaze Team'
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowRssButton = false
  ShowAllPagesInMenu = false
  defaultTheme = "dark"
  DisableThemeToggle = true
  comments = false
  images = ['/stargaze.jpg']
  assets = {disableHLJS = false, favicon = '/favicon.svg', favicon_dark = '/favicon.svg', favicon_16x16 = '/favicon-16x16.png', favicon_32x32 = '/favicon-32x32.png', apple_touch_icon = '/apple-touch-icon.png'}

  [params.homepage]
    cover = {hidden = false, caption = '', type = 'image', image = 'stargaze.jpg'}
    showMore = false
    contentType = 'posts'
    ShowAllPagesInHomepage = false
    NumberOfFeaturedPosts = 0
    socialIcon = ''

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/stargaze2030"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/jla524"

[menu]
  [[menu.main]]
    identifier = "motivation"
    name = "Motivation"
    url = "/motivation/"
    weight = 10
  [[menu.main]]
    identifier = "news"
    name = "News"
    url = "/news/"
    weight = 15
  [[menu.main]]
    identifier = "roadmap"
    name = "Roadmap"
    url = "/roadmap/"
    weight = 20
  [[menu.main]]
    identifier = "companies"
    name = "Companies"
    url = "/companies/"
    weight = 25
  [[menu.main]]
    identifier = "technical"
    name = "Technical"
    url = "/technical/"
    weight = 40
  [[menu.main]]
    identifier = "economics"
    name = "Economics"
    url = "/economics/"
    weight = 50
  [[menu.main]]
    identifier = "glossary"
    name = "Glossary"
    url = "/glossary/"
    weight = 60
