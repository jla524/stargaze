baseURL = '/'
languageCode = 'en-us'
title = 'Stargaze'
theme = 'PaperMod'
env = 'production'

[markup]
  [markup.goldmark]
    renderer = { unsafe = true }

[params]
  description = 'Stargaze tracks the emerging space data center industry — orbital facilities using continuous solar irradiance and passive radiative cooling to meet the compute demands of the AI era.'
  keywords = ['space data centers', 'orbital data centers', 'space computing', 'AI infrastructure', 'radiative cooling', 'solar power satellites', 'LEO data centers', 'space solar power']
  author = 'Stargaze Team'
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButton = false
  ShowAllPagesInMenu = false
  defaultTheme = "dark"
  DisableThemeToggle = true
  comments = false
  assets = {disableHLJS = false, favicon = '/favicon.ico', favicon_dark = '/favicon.ico', favicon_16x16 = '/favicon-16x16.png', favicon_32x32 = '/favicon-32x32.png'}

  [params.homepage]
    cover = {hidden = false, caption = '', type = 'image', src = 'stargaze.jpg'}
    showMore = false
    contentType = 'posts'
    ShowAllPagesInHomepage = false
    NumberOfFeaturedPosts = 0
    socialIcon = ''

