<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <linearGradient id="rackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a1a5a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a2a8a"/>
      <stop offset="100%" stop-color="#3a1a5a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="#0a0618"/>
  <rect width="800" height="500" fill="#1a0f2e" opacity="0.6"/>
  
  <!-- Main interchangeable compute payload enclosure -->
  <rect x="150" y="80" width="500" height="320" rx="12" fill="#1a1428" stroke="#b062eb" stroke-width="4"/>
  
  <!-- Rack bays -->
  <rect x="180" y="110" width="440" height="45" rx="4" fill="url(#rackGrad)" stroke="#6b4a9e" stroke-width="3"/>
  <rect x="180" y="170" width="440" height="45" rx="4" fill="url(#rackGrad)" stroke="#6b4a9e" stroke-width="3"/>
  <rect x="180" y="230" width="440" height="45" rx="4" fill="url(#rackGrad)" stroke="#6b4a9e" stroke-width="3"/>
  <rect x="180" y="290" width="440" height="45" rx="4" fill="url(#rackGrad)" stroke="#6b4a9e" stroke-width="3"/>
  
  <!-- GPU/TPU chips in racks -->
  <!-- Rack 1 -->
  <rect x="200" y="118" width="38" height="28" rx="2" fill="url(#chipGrad)" stroke="#d4a5ff" stroke-width="2"/>
  <rect x="250" y="118" width="38" height="28" rx="2" fill="url(#chipGrad)" stroke="#d4a5ff" stroke-width="2"/>
  <rect x="300" y="118" width="38" height="28" rx="2" fill="url(#chipGrad)" stroke="#d4a5ff" stroke-width="2"/>
  <rect x="350" y="118" width="38" height="28" rx="2" fill="url(#chipGrad)" stroke="#d4a5ff" stroke-width="2"/>
  <rect x="400" y="118" width="38" height="28" rx="2" fill="url(#chipGrad)" stroke="#d4a5ff" stroke-width="2"/>
  <rect x="450" y="118" width="38" height="28" rx="2" fill="url(#chipGrad)" stroke="#d4a5ff" stroke-width="2"/>
  <rect x="500" y="118" width="38" height="28" rx="2" fill="url(#chipGrad)" stroke="#d4a5ff" stroke-width="2"/>
  
  <!-- TMR labels -->
  <text x="570" y="135" fill="#b062eb" font-size="11" font-weight="700">TMR x3</text>
  <text x="570" y="150" fill="#888" font-size="9">Majority vote</text>
  
  <!-- Cooling lines -->
  <path d="M 170 165 Q 120 165 120 220" fill="none" stroke="#22cccc" stroke-width="6" opacity="0.8"/>
  <path d="M 630 195 Q 680 195 680 260" fill="none" stroke="#22cccc" stroke-width="6" opacity="0.8"/>
  <text x="50" y="200" fill="#22cccc" font-size="13" font-weight="600" transform="rotate(-90 55 200)">AMMONIA COOLANT LOOP</text>
  
  <!-- ECC memory bars -->
  <rect x="200" y="275" width="380" height="8" rx="2" fill="#2a1a45" stroke="#b062eb" stroke-width="1.5"/>
  <rect x="200" y="290" width="380" height="8" rx="2" fill="#2a1a45" stroke="#b062eb" stroke-width="1.5"/>
  
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="0.05em">INTERCHANGEABLE COMPUTE PAYLOAD</text>
  <text x="400" y="65" text-anchor="middle" fill="#b062eb" font-size="12" font-weight="400">AI1-CLASS RACK MODULE • 120 kW SUSTAINED / 150 kW PEAK</text>
  
  <!-- Legend -->
  <rect x="650" y="320" width="120" height="140" rx="6" fill="#1a1428" stroke="#b062eb" stroke-width="2" opacity="0.9"/>
  <text x="665" y="340" fill="#b062eb" font-size="11" font-weight="600">KEY</text>
  <rect x="665" y="355" width="18" height="12" fill="#5a2a8a" stroke="#d4a5ff"/>
  <text x="690" y="365" fill="#ddd" font-size="9.5">AI accelerator</text>
  <rect x="665" y="375" width="95" height="5" fill="#2a1a45"/>
  <text x="690" y="385" fill="#ddd" font-size="9.5">ECC Memory</text>
  <line x1="665" y1="400" x2="685" y2="400" stroke="#22cccc" stroke-width="4"/>
  <text x="690" y="405" fill="#ddd" font-size="9.5">Coolant</text>
  
  <text x="400" y="475" text-anchor="middle" fill="#666" font-size="10">Modular chip payload • redundant memory, voting, coolant, and power interfaces</text>
</svg>
